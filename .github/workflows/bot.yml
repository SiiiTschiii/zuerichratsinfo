name: Zurich Ratsinfo Bot

on:
  schedule:
    - cron: "36 * * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

  # Optional: Also run on push to main for testing
  # push:
  #   branches: [ main ]

jobs:
  post-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # Isolated branch that holds the mutable state log (posted votes).
      # Keeping it off `main` lets this Action update state without tripping
      # the pull request ruleset / branch protection on the primary branch.
      STATE_BRANCH: state-log
      STATE_FILES: "data/posted_votes_x.json data/posted_votes_bluesky.json data/posted_votes_instagram.json"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore vote log from state branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin "$STATE_BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$STATE_BRANCH"; then
            echo "State branch '$STATE_BRANCH' found; restoring vote logs from it."
            git checkout "origin/$STATE_BRANCH" -- $STATE_FILES
          else
            echo "State branch '$STATE_BRANCH' not found; using committed vote logs as bootstrap seed."
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"

      - name: Download dependencies
        run: go mod download

      - name: Run bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          BLUESKY_HANDLE: ${{ vars.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          IG_REPO_OWNER: SiiiTschiii
          IG_REPO_NAME: zuerichratsinfo
          MAX_VOTES_TO_CHECK: ${{ vars.MAX_VOTES_TO_CHECK }}
          MAX_VOTE_AGE_DAYS: ${{ vars.MAX_VOTE_AGE_DAYS }}
          X_MAX_POSTS_PER_RUN: ${{ vars.X_MAX_POSTS_PER_RUN }}
          X_MAX_CHARS: ${{ vars.X_MAX_CHARS }}
          BLUESKY_MAX_POSTS_PER_RUN: ${{ vars.BLUESKY_MAX_POSTS_PER_RUN }}
          IG_MAX_POSTS_PER_RUN: ${{ vars.IG_MAX_POSTS_PER_RUN }}
        run: go run main.go

      - name: Commit updated vote log to state branch
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Update the state log on the isolated STATE_BRANCH using a dedicated
          # worktree, so nothing is ever committed to the protected primary branch.
          worktree="$(mktemp -d)"
          if git show-ref --verify --quiet "refs/remotes/origin/$STATE_BRANCH"; then
            git worktree add -B "$STATE_BRANCH" "$worktree" "origin/$STATE_BRANCH"
          else
            echo "Creating new state branch '$STATE_BRANCH'."
            git worktree add --orphan -b "$STATE_BRANCH" "$worktree"
          fi

          mkdir -p "$worktree/data"
          cp $STATE_FILES "$worktree/data/"

          git -C "$worktree" add $STATE_FILES
          if git -C "$worktree" diff --staged --quiet; then
            echo "No vote log changes to commit."
          else
            git -C "$worktree" commit -m "Update posted votes log [skip ci]"
            git -C "$worktree" push origin "$STATE_BRANCH"
          fi

          git worktree remove --force "$worktree"
